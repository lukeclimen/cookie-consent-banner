name: Documentation Issue
description: Report missing, incorrect, or unclear documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: Affected page or section
      description: Which part of the documentation has the issue?
      placeholder: "e.g. README — Configuration options"
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Issue type
      options:
        - Incorrect information
        - Missing information
        - Unclear or confusing
        - Typo or formatting
        - Other
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current documentation
      description: Quote or describe what the docs currently say.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What it should say
      description: What would accurate or clearer documentation look like?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
