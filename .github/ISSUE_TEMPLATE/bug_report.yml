name: Bug Report
description: Report a bug with the cookie consent banner
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible — issues without a reproduction link may be closed.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Library version
      description: Which version of cookie-consent-banner are you using?
      placeholder: "e.g. 1.2.0"
    validations:
      required: true
  - type: input
    id: reproduction
    attributes:
      label: Reproduction
      description: A link to a CodeSandbox, StackBlitz, or minimal HTML file that demonstrates the issue. Issues without a reproduction may be closed without discussion.
      placeholder: "https://codesandbox.io/..."
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue in your reproduction.
      placeholder: |
        1. Open the sandbox
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: browsers
    attributes:
      label: Browser(s)
      description: Which browsers are affected?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14, Windows 11, iOS 17"
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, console errors, related issues.
